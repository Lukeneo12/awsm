name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: GoReleaser (build cross-platform binaries + publish release)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
