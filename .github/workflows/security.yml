name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # weekly, Mondays 09:00 UTC

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: govulncheck (Go vulnerability database, reachability-aware)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
